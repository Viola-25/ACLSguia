<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guia ACLS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.8; }
        }
        .animate-pulse-soft {
            animation: pulseSoft 0.545s infinite;
        }

        @keyframes pulseUrgent {
            0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
            50% { transform: scale(1.02); opacity: 0.9; box-shadow: 0 0 0 8px rgba(220,38,38,0); }
        }
        .animate-pulse-urgent {
            animation: pulseUrgent 1s infinite;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .timer-text {
            font-variant-numeric: tabular-nums;
        }

        @keyframes blink-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.96); }
        }
        .animate-blink {
            animation: blink-pulse 0.8s ease-in-out infinite;
        }

        .h-dynamic {
            height: 100vh;
            height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .diamond-shape {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid currentColor;
        }
    </style>
</head>
<body class="text-slate-900">
    <div id="root" class="h-dynamic w-screen flex justify-center bg-black"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const CYCLE_DURATION = 120;
        const ADRENALINE_DURATION = 240;
        const BPM_MIN = 60;
        const BPM_MAX = 160;
        const BPM_DEFAULT = 110;

        const formatTime = (totalSeconds) => {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const getCurrentTimeStr = () => {
            return new Date().toTimeString().split(' ')[0];
        };

        const STORAGE_CURRENT = 'acls_current';
        const STORAGE_REPORTS = 'acls_reports';
        const STORAGE_POSTCARE = 'acls_postcare_state';

        const POST_RCP_GUIDANCE = {
            'Hipovolemia': {
                title: 'Hipovolemia',
                icon: 'fa-droplet',
                actions: [
                    'Administrar fluidos IV/IO (cristaloides 1-2L)',
                    'Considerar hemoderivados se suspecta de hemorragia',
                    'Controlar fonte de sangramento ativo',
                    'Reavaliar perfusão tecidual (PAM > 65 mmHg)',
                    'Solicitar tipagem sanguínea e prova cruzada'
                ]
            },
            'Hipóxia': {
                title: 'Hipóxia',
                icon: 'fa-lungs',
                actions: [
                    'Garantir via aérea pérvia (IOT se necessário)',
                    'Ventilar com O2 a 100%',
                    'Monitorar SpO2 (alvo 92-98%)',
                    'Capnografia quantitativa (EtCO2 35-45 mmHg)',
                    'Considerar gasometria arterial seriada'
                ]
            },
            'Hidrogênio (acidose)': {
                title: 'Acidose Metabólica',
                icon: 'fa-flask',
                actions: [
                    'Considerar Bicarbonato de Sódio 1 mEq/kg',
                    'Verificar gasometria arterial (pH, HCO3, lactato)',
                    'Hiperventilar se acidose respiratória grave',
                    'Avaliar causa base (sepse, cetoacidose, intoxicação)',
                    'Repetir gasometria após intervenção'
                ]
            },
            'Hipo/Hipercalemia': {
                title: 'Distúrbio do Potássio',
                icon: 'fa-vial',
                actions: [
                    'Verificar potássio sérico urgentemente',
                    'Hipercalemia: Gluconato de Cálcio IV, insulina + glicose, bicarbonato',
                    'Hipercalemia: Albuterol inalatório, diálise se refratário',
                    'Hipocalemia: Reposição de potássio IV (10-20 mEq/h)',
                    'Monitorar ECG para alterações do ritmo'
                ]
            },
            'Hipotermia': {
                title: 'Hipotermia',
                icon: 'fa-temperature-low',
                actions: [
                    'Medir temperatura central (esofágica, vesical)',
                    'Iniciar reaquecimento ativo externo (cobertores, calor radiante)',
                    'Reaquecimento interno: fluidos aquecidos IV, lavagem aquecida',
                    'ECMO se instabilidade refratária',
                    'Continuar RCP até normotermia (>35°C)'
                ]
            },
            'Tensão no tórax (Pneumotórax)': {
                title: 'Pneumotórax Hipertensivo',
                icon: 'fa-lung',
                actions: [
                    'Descompressão com agulha no 2° EIC, linha hemiclavicular',
                    'Confirmar com drenagem torácica (dreno de tórax)',
                    'Oxigenioterapia e suporte ventilatório',
                    'Rx tórax AP para confirmação',
                    'Reavaliar expansão pulmonar e sinais vitais'
                ]
            },
            'Tamponamento cardíaco': {
                title: 'Tamponamento Cardíaco',
                icon: 'fa-heart',
                actions: [
                    'Realizar pericardiocentese guiada por ECO',
                    'Reposição volêmica agressiva',
                    'Considerar janela pericárdica cirúrgica',
                    'Monitorar sinais de baixo débito (PAM, lactato)',
                    'ECG: baixa voltagem, alternância elétrica'
                ]
            },
            'Toxinas': {
                title: 'Toxinas / Overdose',
                icon: 'fa-skull',
                actions: [
                    'Administrar antídoto específico se disponível',
                    'Suporte avançado de vida conforme necessário',
                    'Carvão ativado se ingestão recente (< 1h)',
                    'Considerar lavagem gástrica se indicado',
                    'Consultar centro de intoxicação'
                ]
            },
            'Trombose pulmonar': {
                title: 'TEP (Tromboembolismo Pulmonar)',
                icon: 'fa-bolt',
                actions: [
                    'Suporte hemodinâmico com vasopressores',
                    'Considerar trombolítico (se IMC > 40 ou instável)',
                    'Heparina não fracionada ou de baixo peso molecular',
                    'ECG: S1Q3T3, BCRD, sobrecarga VD',
                    'AngioTC de tórax se estável para confirmar'
                ]
            },
            'Trombose coronariana': {
                title: 'IAM (Infarto Agudo do Miocárdio)',
                icon: 'fa-heart-pulse',
                actions: [
                    'ECG de 12 derivações imediato',
                    'AAS 162-325 mg mastigável',
                    'Acesso à hemodinâmica para angioplastia primária',
                    'Se IAMCSST: meta porta-balão < 90 min',
                    'Trombolítico se sem acesso à hemodinâmica em tempo hábil'
                ]
            }
        };

        const SCENARIO_LABELS = {
            cardiacArrest: 'Parada Cardíaca',
            bradycardia: 'Bradiarritmia',
            tachycardia: 'Taquiarritmia'
        };

        const CircularTimer = ({ label, subLabel, progress, max, colorClass, trailColorClass = "text-slate-700" }) => {
            const radius = 32;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (progress / max) * circumference;

            return (
                <div className="grid place-items-center w-20 h-20">
                    <svg className="w-full h-full col-start-1 row-start-1" viewBox="0 0 80 80">
                        <circle
                            className={`${trailColorClass} stroke-current`}
                            strokeWidth="4"
                            fill="none"
                            r={radius}
                            cx="40"
                            cy="40"
                            transform="rotate(-90, 40, 40)"
                        />
                        <circle
                            className={`${colorClass} stroke-current transition-all duration-1000 ease-linear`}
                            strokeWidth="4"
                            strokeLinecap="round"
                            fill="none"
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            r={radius}
                            cx="40"
                            cy="40"
                            transform="rotate(-90, 40, 40)"
                        />
                    </svg>
                    <div className="col-start-1 row-start-1 flex flex-col items-center justify-center -mt-0.5">
                        <span className="text-base font-bold text-white tracking-wider leading-tight drop-shadow-md">{label}</span>
                        <span className="text-[8px] text-slate-400 font-medium -mt-0.5">{subLabel}</span>
                    </div>
                </div>
            );
        };

        const Modal = ({ show, title, message, onConfirm, onCancel, confirmText = "Confirmar", cancelText = "Cancelar", danger = false, children }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl">
                        <h3 className="text-lg font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-sm mb-5">{message}</p>
                        {children ? children : (
                            <div className="flex justify-end space-x-3">
                                <button onClick={onCancel} className="px-4 py-2 rounded-xl font-semibold text-sm text-slate-600 hover:bg-slate-100 transition-colors">
                                    {cancelText}
                                </button>
                                <button onClick={onConfirm} className={`px-4 py-2 rounded-xl font-semibold text-sm text-white transition-colors shadow-md ${danger ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                    {confirmText}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const OutcomeModal = ({ show, scenario, onRCE, onObito, onResolucao, onEvolucaoParada, onCancel }) => {
            if (!show) return null;
            const isCardiacArrest = scenario === 'cardiacArrest';
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                        <div className="text-center mb-2">
                            <div className="w-14 h-14 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-3">
                                <i className="fas fa-triangle-exclamation text-2xl text-amber-600"></i>
                            </div>
                            <h3 className="text-lg font-bold text-slate-800">Finalizar Procedimento</h3>
                            <p className="text-slate-500 text-sm mt-1">Selecione o desfecho clínico:</p>
                        </div>
                        <div className="space-y-3 mt-4">
                            {isCardiacArrest ? (
                                <>
                                    <button onClick={onRCE} className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-5 px-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-4">
                                        <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                                            <i className="fas fa-heart-pulse text-xl"></i>
                                        </div>
                                        <div className="text-left">
                                            <div className="text-base">RCE</div>
                                            <div className="text-xs font-medium text-green-100">Retorno da Circulação Espontânea</div>
                                        </div>
                                    </button>
                                    <button onClick={onObito} className="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-5 px-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-4">
                                        <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                                            <i className="fas fa-cross text-xl"></i>
                                        </div>
                                        <div className="text-left">
                                            <div className="text-base">Óbito</div>
                                            <div className="text-xs font-medium text-red-200">Declaração de óbito</div>
                                        </div>
                                    </button>
                                </>
                            ) : (
                                <>
                                    <button onClick={onResolucao} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-5 px-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-4">
                                        <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                                            <i className="fas fa-check text-xl"></i>
                                        </div>
                                        <div className="text-left">
                                            <div className="text-base">Resolução</div>
                                            <div className="text-xs font-medium text-emerald-100">Ritmo normalizado / estabilização</div>
                                        </div>
                                    </button>
                                    <button onClick={onEvolucaoParada} className="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-5 px-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-4">
                                        <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                                            <i className="fas fa-heart-circle-exclamation text-xl"></i>
                                        </div>
                                        <div className="text-left">
                                            <div className="text-base">Evolução para Parada</div>
                                            <div className="text-xs font-medium text-red-200">Iniciar algoritmo de Parada Cardíaca</div>
                                        </div>
                                    </button>
                                </>
                            )}
                            <button onClick={onCancel} className="w-full py-3 rounded-xl font-semibold text-sm text-slate-500 hover:bg-slate-50 transition-colors">
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('home');
            const [activeTab, setActiveTab] = useState('procedimento');
            const [selectedScenario, setSelectedScenario] = useState(null);
            
            const [isRunning, setIsRunning] = useState(false);
            const [startTime, setStartTime] = useState(null);
            const [elapsedSecs, setElapsedSecs] = useState(0);
            
            const [cycleCount, setCycleCount] = useState(0);
            const [lastAdrenalineTime, setLastAdrenalineTime] = useState(null);
            
            const [diagnosis, setDiagnosis] = useState(null);
            const [causaSuspeita, setCausaSuspeita] = useState(null);
            const [events, setEvents] = useState([]);
            const [procedureOutcome, setProcedureOutcome] = useState(null);
            
            const [isMuted, setIsMuted] = useState(true);
            const [bpm, setBpm] = useState(BPM_DEFAULT);
            const [modalConfig, setModalConfig] = useState({ show: false });
            const [outcomeModal, setOutcomeModal] = useState(false);
            const [tickVisual, setTickVisual] = useState(false);
            const [defibrillationCount, setDefibrillationCount] = useState(0);
            const [amiodaroneDoseCount, setAmiodaroneDoseCount] = useState(0);
            const [lidocaineGiven, setLidocaineGiven] = useState(false);
            const [suggestedAction, setSuggestedAction] = useState(null);
            const [reports, setReports] = useState([]);
            const [viewingReport, setViewingReport] = useState(null);
            const [homeTab, setHomeTab] = useState('rcps');
            const [wakeLockActive, setWakeLockActive] = useState(false);

            // Bradycardia-specific
            const [atropineGiven, setAtropineGiven] = useState(false);
            const [pacerPlaced, setPacerPlaced] = useState(false);
            const [bradyUnstable, setBradyUnstable] = useState(null);
            const [epinefrinaBicGiven, setEpinefrinaBicGiven] = useState(false);
            const [dopaminaBicGiven, setDopaminaBicGiven] = useState(false);

            // Tachycardia-specific
            const [tachyUnstable, setTachyUnstable] = useState(null);
            const [tachyType, setTachyType] = useState(null);
            const [adenosineGiven, setAdenosineGiven] = useState(false);
            const [cardioversionDone, setCardioversionDone] = useState(false);
            const [vagalManeuverDone, setVagalManeuverDone] = useState(false);

            // Notifications
            const [notifications, setNotifications] = useState([]);
            const lastAdrenalineNotifRef = useRef(0);
            const lastOperatorChangeRef = useRef(0);
            const lastRhythmNotifRef = useRef(null);
            const lastShockNotifRef = useRef(null);

            // Post-care advanced state
            const [postCareState, setPostCareState] = useState({ ht: { stage: null, startTime: null, targetTime: null }, stemi: { ecg: null, doorToBalloon: null, meds: [] } });

            const audioCtxRef = useRef(null);
            const metronomeIntervalRef = useRef(null);
            const timerRef = useRef(null);
            const prevCycleRef = useRef(0);
            const wakeLockRef = useRef(null);

            useEffect(() => {
                if (isRunning) {
                    timerRef.current = setInterval(() => {
                        const totalSecs = Math.floor((Date.now() - startTime) / 1000);
                        setElapsedSecs(totalSecs);
                        if (selectedScenario === 'cardiacArrest') {
                            setCycleCount(Math.floor(totalSecs / CYCLE_DURATION) + 1);
                        }
                    }, 1000);

                    if (!audioCtxRef.current) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        audioCtxRef.current = new AudioContext();
                    }

                    const ms = 60000 / bpm;
                    metronomeIntervalRef.current = setInterval(() => {
                        setTickVisual(prev => !prev);
                        
                        if (!isMuted && audioCtxRef.current && audioCtxRef.current.state === 'running') {
                            try {
                                const osc = audioCtxRef.current.createOscillator();
                                const gain = audioCtxRef.current.createGain();
                                osc.connect(gain);
                                gain.connect(audioCtxRef.current.destination);
                                
                                osc.type = 'sine';
                                osc.frequency.setValueAtTime(800, audioCtxRef.current.currentTime);
                                
                                gain.gain.setValueAtTime(0, audioCtxRef.current.currentTime);
                                gain.gain.linearRampToValueAtTime(0.5, audioCtxRef.current.currentTime + 0.01);
                                gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.15);
                                
                                osc.start(audioCtxRef.current.currentTime);
                                osc.stop(audioCtxRef.current.currentTime + 0.1);
                            } catch (e) { console.error("Audio error", e); }
                        }
                    }, ms);

                } else {
                    clearInterval(timerRef.current);
                    clearInterval(metronomeIntervalRef.current);
                }

                return () => {
                    clearInterval(timerRef.current);
                    clearInterval(metronomeIntervalRef.current);
                };
            }, [isRunning, startTime, isMuted, bpm, selectedScenario]);

            useEffect(() => {
                if (isRunning && cycleCount > 1 && cycleCount !== prevCycleRef.current && selectedScenario === 'cardiacArrest') {
                    prevCycleRef.current = cycleCount;
                    if (!suggestedAction || suggestedAction === 'reavaliar_ritmo') {
                        setSuggestedAction('reavaliar_ritmo');
                    }
                }
            }, [cycleCount, isRunning, suggestedAction, selectedScenario]);

            useEffect(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_CURRENT);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.events) setEvents(data.events);
                        if (data.diagnosis) setDiagnosis(data.diagnosis);
                        if (data.defibrillationCount) setDefibrillationCount(data.defibrillationCount);
                        if (data.amiodaroneDoseCount) setAmiodaroneDoseCount(data.amiodaroneDoseCount);
                        if (data.lastAdrenalineTime) setLastAdrenalineTime(data.lastAdrenalineTime);
                        if (data.startTime) setStartTime(data.startTime);
                        if (data.outcome) setProcedureOutcome(data.outcome);
                        if (data.selectedScenario) setSelectedScenario(data.selectedScenario);
                        if (data.causaSuspeita) setCausaSuspeita(data.causaSuspeita);
                        if (data.postCareState) setPostCareState(data.postCareState);
                        if (data.isRunning && data.startTime) {
                            setIsRunning(true);
                            setElapsedSecs(Math.floor((Date.now() - data.startTime) / 1000));
                            requestWakeLock();
                        }
                        if (data.currentView === 'postCare') setCurrentView('postCare');
                        else if (data.isRunning && data.startTime) setCurrentView('procedure');
                    }
                    try {
                        const rep = JSON.parse(localStorage.getItem(STORAGE_REPORTS) || '[]');
                        if (Array.isArray(rep)) setReports(rep);
                    } catch (e) { /* ignore */ }
                } catch (e) {
                    console.error('Falha ao restaurar dados salvos', e);
                }
            }, []);

            useEffect(() => {
                try {
                    const data = {
                        events,
                        diagnosis,
                        defibrillationCount,
                        amiodaroneDoseCount,
                        lastAdrenalineTime,
                        startTime,
                        isRunning,
                        currentView,
                        outcome: procedureOutcome,
                        selectedScenario,
                        causaSuspeita,
                        postCareState
                    };
                    localStorage.setItem(STORAGE_CURRENT, JSON.stringify(data));
                } catch (e) {
                    console.error('Falha ao salvar dados', e);
                }
            }, [events, diagnosis, defibrillationCount, amiodaroneDoseCount, lastAdrenalineTime, startTime, isRunning, currentView, procedureOutcome, selectedScenario, causaSuspeita, postCareState]);

            const cycleSeconds = elapsedSecs % CYCLE_DURATION;
            const adrenalineSeconds = lastAdrenalineTime 
                ? Math.floor((Date.now() - lastAdrenalineTime) / 1000) 
                : 0;

            const logEvent = (type, title, description = '', forcedElapsed) => {
                const nowStr = getCurrentTimeStr();
                const elapsed = forcedElapsed !== undefined ? forcedElapsed : elapsedSecs;
                const elapsedStr = formatTime(elapsed);
                const cycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
                setEvents(prev => [{
                    id: Date.now(),
                    type,
                    title,
                    description,
                    absoluteTime: nowStr,
                    elapsedTime: elapsedStr,
                    cycle
                }, ...prev]);
            };

            const fullResetState = () => {
                setEvents([]);
                setDiagnosis(null);
                setCausaSuspeita(null);
                setDefibrillationCount(0);
                setAmiodaroneDoseCount(0);
                setLidocaineGiven(false);
                setLastAdrenalineTime(null);
                setSuggestedAction(null);
                setAtropineGiven(false);
                setPacerPlaced(false);
                setBradyUnstable(null);
                setTachyUnstable(null);
                setTachyType(null);
                setAdenosineGiven(false);
                setCardioversionDone(false);
                setEpinefrinaBicGiven(false);
                setDopaminaBicGiven(false);
                setVagalManeuverDone(false);
                setProcedureOutcome(null);
                setElapsedSecs(0);
                setCycleCount(1);
                setNotifications([]);
                setPostCareState({ ht: { stage: null, startTime: null, targetTime: null }, stemi: { ecg: null, doorToBalloon: null, meds: [] } });
                lastAdrenalineNotifRef.current = 0;
                lastOperatorChangeRef.current = 0;
            };

            const handleStartProcedure = (scenario) => {
                fullResetState();
                setSelectedScenario(scenario);
                const now = Date.now();
                setStartTime(now);
                setIsRunning(true);
                setCurrentView('procedure');
                
                localStorage.removeItem(STORAGE_CURRENT);
                
                logEvent('system', 'Procedimento iniciado', `${SCENARIO_LABELS[scenario]} — ${new Date().toLocaleDateString('pt-BR')} ${getCurrentTimeStr()}`, 0);
                
                requestWakeLock();
                
                if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
            };

            const handleAction = (category, item) => {
                const actionVerb = category === 'diagnosis' ? 'Diagnosticado' : 'Executado';
                logEvent('action', `${actionVerb} ${item}`, `${formatTime(elapsedSecs)} de procedimento`);
                
                if (category === 'diagnosis') {
                    setDiagnosis(item);
                    if (selectedScenario === 'cardiacArrest') {
                        if (item === 'FV / TVSP') {
                            setSuggestedAction('desfribilacao');
                        } else {
                            const now = Date.now();
                            if (!lastAdrenalineTime || now - lastAdrenalineTime > 240000) {
                                setSuggestedAction('adrenalina');
                            } else {
                                setSuggestedAction(null);
                            }
                        }
                    }
                } else if (item.startsWith('Desfibrilação')) {
                    dismissNotificationByAction('desfribilacao');
                    const newCount = defibrillationCount + 1;
                    setDefibrillationCount(newCount);
                    const now = Date.now();
                    if (newCount === 3 && amiodaroneDoseCount < 1) {
                        setSuggestedAction('amiodarona');
                    } else if (newCount === 5 && amiodaroneDoseCount < 2) {
                        setSuggestedAction('amiodarona');
                    } else if (newCount >= 2 && (!lastAdrenalineTime || now - lastAdrenalineTime > 240000)) {
                        setSuggestedAction('adrenalina');
                    } else {
                        setSuggestedAction(null);
                    }
                } else if (item.startsWith('Adrenalina')) {
                    dismissNotificationByAction('adrenalina');
                    setLastAdrenalineTime(Date.now());
                    setSuggestedAction(null);
                } else if (item.startsWith('Amiodarona')) {
                    setAmiodaroneDoseCount(prev => Math.min(prev + 1, 2));
                    setSuggestedAction(null);
                } else if (item.startsWith('Lidocaína')) {
                    setLidocaineGiven(true);
                    setSuggestedAction(null);
                } else if (item.startsWith('Atropina')) {
                    setAtropineGiven(true);
                } else if (item.includes('Marca-passo')) {
                    setPacerPlaced(true);
                } else if (item.startsWith('Adenosina')) {
                    setAdenosineGiven(true);
                } else if (item === 'Cardioversão sincronizada') {
                    setCardioversionDone(true);
                } else if (item === 'Epinefrina BIC' || item === 'Epinefrina') {
                    setEpinefrinaBicGiven(true);
                } else if (item.startsWith('Dopamina')) {
                    setDopaminaBicGiven(true);
                } else if (item === 'Manobras vagais') {
                    setVagalManeuverDone(true);
                }
            };

            const confirmDeleteEvent = (id) => {
                setModalConfig({
                    show: true,
                    title: 'Remover Evento',
                    message: 'Deseja realmente remover este registro do relatório?',
                    confirmText: 'Remover',
                    danger: true,
                    onConfirm: () => {
                        setEvents(prev => prev.filter(e => e.id !== id));
                        setModalConfig({ show: false });
                    },
                    onCancel: () => setModalConfig({ show: false })
                });
            };

            const requestFinish = () => {
                setOutcomeModal(true);
            };

            const handleOutcomeRCE = () => {
                setProcedureOutcome('rce');
                setOutcomeModal(false);
                setIsRunning(false);
                releaseWakeLock();
                logEvent('system', 'Procedimento finalizado', `Desfecho: RCE — Duração total: ${formatTime(elapsedSecs)}`);
                setCurrentView('postCare');
            };

            const handleOutcomeObito = () => {
                setOutcomeModal(false);
                setIsRunning(false);
                releaseWakeLock();
                logEvent('system', 'Procedimento finalizado', `Desfecho: Óbito — Duração total: ${formatTime(elapsedSecs)}`);
                setProcedureOutcome('obito');
                handleSaveComplete('obito', selectedScenario, causaSuspeita);
            };

            const handleOutcomeResolucao = () => {
                setOutcomeModal(false);
                setIsRunning(false);
                releaseWakeLock();
                logEvent('system', 'Procedimento finalizado', `Desfecho: Resolução — Duração total: ${formatTime(elapsedSecs)}`);
                setProcedureOutcome('resolucao');
                handleSaveComplete('resolucao', selectedScenario, causaSuspeita);
            };

            const handleOutcomeEvolucaoParada = () => {
                setOutcomeModal(false);
                logEvent('system', 'Paciente evoluiu para Parada Cardíaca', `Evolução em ${formatTime(elapsedSecs)} de procedimento`);
                setProcedureOutcome('evolucao_parada');
                setSelectedScenario('cardiacArrest');
                setDiagnosis(null);
                setDefibrillationCount(0);
                setAmiodaroneDoseCount(0);
                setLidocaineGiven(false);
                setLastAdrenalineTime(null);
                setSuggestedAction(null);
                setElapsedSecs(0);
                setCycleCount(1);
                setStartTime(Date.now());
                setEpinefrinaBicGiven(false);
                setDopaminaBicGiven(false);
                setVagalManeuverDone(false);
            };

            const generateReportText = (srcEvents, srcDate, srcScenario) => {
                const dateStr = srcDate
                    ? new Date(srcDate).toLocaleDateString('pt-BR') + ' ' + new Date(srcDate).toTimeString().slice(0,5)
                    : new Date().toLocaleDateString('pt-BR') + ' ' + getCurrentTimeStr().slice(0,5);
                const items = srcEvents || events;
                const scenario = srcScenario || selectedScenario;
                let text = `=== RELATÓRIO ACLS ===\n`;
                text += `Data: ${dateStr}\n`;
                text += `Cenário: ${SCENARIO_LABELS[scenario] || '—'}\n`;
                text += `Desfecho: ${procedureOutcome === 'rce' ? 'RCE (Retorno da Circulação Espontânea)' : procedureOutcome === 'obito' ? 'Óbito' : procedureOutcome === 'resolucao' ? 'Resolução (ritmo normalizado)' : procedureOutcome === 'evolucao_parada' ? 'Evoluiu para Parada Cardíaca' : '—'}\n`;
                const startEv = items.filter(e => e.type === 'system');
                if (startEv.length) text += `Início: ${startEv[startEv.length-1].description}\n`;
                text += `\n`;
                if (scenario === 'cardiacArrest') {
                    const drugsList = ['Adrenalina', 'Amiodarona', 'Bic. Sódio', 'Cálcio', 'Magnésio', 'Lidocaína', 'Potássio', 'Volume'];
                    const cycleMap = {};
                    items.forEach(ev => {
                        if (ev.type === 'system') return;
                        const c = ev.cycle || 1;
                        if (!cycleMap[c]) cycleMap[c] = { cycle: c, rhythm: '', shock: false, drugs: [], interventions: [] };
                        const row = cycleMap[c];
                        if (ev.title.startsWith('Diagnosticado ')) {
                            row.rhythm = ev.title.slice('Diagnosticado '.length);
                        } else if (ev.title === 'Executado Desfibrilação') {
                            row.shock = true;
                        } else if (ev.title.startsWith('Executado ')) {
                            const action = ev.title.slice('Executado '.length);
                            if (drugsList.includes(action)) {
                                if (!row.drugs.includes(action)) row.drugs.push(action);
                            } else {
                                if (!row.interventions.includes(action)) row.interventions.push(action);
                            }
                        }
                    });
                    const cycles = Object.values(cycleMap).sort((a, b) => a.cycle - b.cycle);
                    cycles.forEach(row => {
                        text += `Ciclo ${row.cycle}\n`;
                        text += `  Ritmo: ${row.rhythm || '—'}\n`;
                        text += `  Choque: ${row.shock ? 'SIM' : 'NÃO'}\n`;
                        text += `  Drogas: ${row.drugs.length ? row.drugs.join(', ') : '—'}\n`;
                        text += `  Intervenções: ${row.interventions.length ? row.interventions.join(', ') : '—'}\n`;
                        text += `\n`;
                    });
                } else {
                    const sorted = [...items].filter(e => e.type !== 'system').reverse();
                    sorted.forEach(ev => {
                        text += `[${ev.elapsedTime}] ${ev.title}`;
                        if (ev.description) text += ` — ${ev.description}`;
                        text += `\n`;
                    });
                }
                return text;
            };

            const handleCopyReport = () => {
                const text = generateReportText();
                navigator.clipboard.writeText(text).then(() => {
                    setModalConfig({
                        show: true,
                        title: 'Relatório Copiado',
                        message: 'O relatório foi copiado para a área de transferência.',
                        confirmText: 'OK',
                        onConfirm: () => setModalConfig({ show: false }),
                        onCancel: () => setModalConfig({ show: false })
                    });
                }).catch(() => {
                    setModalConfig({
                        show: true,
                        title: 'Erro ao Copiar',
                        message: 'Não foi possível copiar o relatório automaticamente.',
                        confirmText: 'OK',
                        onConfirm: () => setModalConfig({ show: false }),
                        onCancel: () => setModalConfig({ show: false })
                    });
                });
            };

            const handleDownloadReport = () => {
                const text = generateReportText();
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `relatorio_acls_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleToggleMute = () => {
                if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
                setIsMuted(!isMuted);
            };

            const requestWakeLock = async () => {
                try {
                    if ('wakeLock' in navigator) {
                        const wl = await navigator.wakeLock.request('screen');
                        wakeLockRef.current = wl;
                        setWakeLockActive(true);
                        wl.addEventListener('release', () => {
                            setWakeLockActive(false);
                            wakeLockRef.current = null;
                        });
                    } else {
                        setWakeLockActive(false);
                    }
                } catch (e) {
                    console.log('Wake Lock não disponível', e);
                    setWakeLockActive(false);
                }
            };

            const releaseWakeLock = () => {
                if (wakeLockRef.current) {
                    wakeLockRef.current.release();
                    wakeLockRef.current = null;
                }
            };

            // ── NOTIFICATION HELPERS ──
            const playNotificationSound = (urgent = false) => {
                if (!audioCtxRef.current || isMuted) return;
                try {
                    const ctx = audioCtxRef.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = urgent ? 'sawtooth' : 'sine';
                    osc.frequency.setValueAtTime(urgent ? 880 : 660, ctx.currentTime);
                    if (urgent) {
                        gain.gain.setValueAtTime(0.4, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.3);
                        setTimeout(() => {
                            const osc2 = ctx.createOscillator();
                            const gain2 = ctx.createGain();
                            osc2.connect(gain2);
                            gain2.connect(ctx.destination);
                            osc2.type = 'sawtooth';
                            osc2.frequency.setValueAtTime(1100, ctx.currentTime);
                            gain2.gain.setValueAtTime(0.4, ctx.currentTime);
                            gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                            osc2.start(ctx.currentTime);
                            osc2.stop(ctx.currentTime + 0.4);
                        }, 200);
                    } else {
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.15);
                    }
                } catch (e) { /* ignore */ }
            };

            const triggerVibrate = (pattern = 200) => {
                try { if ('vibrate' in navigator) navigator.vibrate(pattern); } catch (e) { /* ignore */ }
            };

            const addNotification = (type, message, actionId = null) => {
                const id = Date.now() + Math.random();
                setNotifications(prev => [...prev, { id, type, message, actionId, time: Date.now() }]);
                playNotificationSound(type === 'shock' || type === 'adrenaline');
                if (type === 'shock' || type === 'adrenaline') triggerVibrate([200, 100, 200]);
                logEvent('alerta', `[Alerta] ${message}`, `Tipo: ${type}`);
                return id;
            };

            const dismissNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            const dismissNotificationByAction = (actionId) => {
                setNotifications(prev => prev.filter(n => n.actionId !== actionId));
            };



            // ── NOTIFICATION MONITORING ──
            useEffect(() => {
                if (!isRunning || selectedScenario !== 'cardiacArrest') return;
                if (suggestedAction === 'reavaliar_ritmo' && cycleCount > 1 && cycleCount !== lastRhythmNotifRef.current) {
                    lastRhythmNotifRef.current = cycleCount;
                    addNotification('rhythm', 'Reavaliar ritmo — fim do ciclo de RCP', 'reavaliar_ritmo');
                }
                if (cycleCount > 1 && cycleCount !== lastOperatorChangeRef.current) {
                    lastOperatorChangeRef.current = cycleCount;
                    addNotification('info', 'Trocar operador de RCP — compressões por 2 min');
                }
            }, [cycleCount, suggestedAction]);

            useEffect(() => {
                if (!isRunning || selectedScenario !== 'cardiacArrest' || !diagnosis) return;
                if (diagnosis === 'FV / TVSP' && diagnosis !== lastShockNotifRef.current) {
                    lastShockNotifRef.current = diagnosis;
                    addNotification('shock', 'CHOQUE INDICADO — Desfibrilar imediatamente!', 'desfribilacao');
                }
            }, [diagnosis]);

            useEffect(() => {
                if (!isRunning || selectedScenario !== 'cardiacArrest') return;
                const interval = setInterval(() => {
                    const now = Date.now();
                    const elapsed = lastAdrenalineTime ? now - lastAdrenalineTime : 0;
                    if (elapsed > 240000 && now - lastAdrenalineNotifRef.current > 60000) {
                        lastAdrenalineNotifRef.current = now;
                        addNotification('adrenaline', 'Administrar Adrenalina 1mg IV/IO (a cada 3-5 min)', 'adrenalina');
                    }
                }, 10000);
                return () => clearInterval(interval);
            }, [isRunning, selectedScenario, lastAdrenalineTime]);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && isRunning) {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [isRunning]);

            const handleSaveComplete = (outcomeOverride, scenarioOverride, causaOverride) => {
                const report = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    events,
                    diagnosis,
                    totalTime: elapsedSecs,
                    cycleCount,
                    defibrillationCount,
                    amiodaroneDoseCount,
                    scenario: scenarioOverride || selectedScenario,
                    outcome: outcomeOverride || procedureOutcome,
                    causaSuspeita: causaOverride || causaSuspeita
                };
                const updated = [report, ...reports];
                setReports(updated);
                try {
                    localStorage.setItem(STORAGE_REPORTS, JSON.stringify(updated));
                } catch (e) { /* ignore */ }
                localStorage.removeItem(STORAGE_CURRENT);
                releaseWakeLock();
                setCurrentView('home');
                fullResetState();
            };

            // ── HOME SCREEN ──
            const renderHome = () => (
                <div className="flex flex-col h-dynamic bg-slate-50 w-full max-w-md mx-auto shadow-2xl relative">
                    <header className="bg-slate-800 text-white p-5 flex items-center justify-center shadow-lg z-10">
                        <h1 className="text-xl font-bold tracking-wide"><span className="text-blue-400">Guia</span> <span className="text-white">ACLS</span></h1>
                    </header>
                    
                    <div className="flex bg-white shadow-sm z-0">
                        <button onClick={() => setHomeTab('rcps')} className={`flex-1 py-4 font-bold transition-colors ${homeTab === 'rcps' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-slate-400 hover:text-slate-600'}`}>Registros</button>
                        <button onClick={() => setHomeTab('estatisticas')} className={`flex-1 py-4 font-bold transition-colors ${homeTab === 'estatisticas' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-slate-400 hover:text-slate-600'}`}>Estatísticas</button>
                    </div>
                    
                    {homeTab === 'rcps' && (
                    <div className="flex-1 overflow-y-auto animate-fade-in hide-scrollbar">
                        {reports.length === 0 ? (
                            <div className="flex flex-col items-center justify-center p-8 text-center min-h-full">
                                <div className="w-28 h-28 bg-slate-100 rounded-full flex items-center justify-center mb-6 text-slate-300 shadow-inner">
                                    <i className="fas fa-file-medical-alt text-5xl"></i>
                                </div>
                                <h2 className="text-xl font-bold text-slate-700 mb-2">Nenhum Registro</h2>
                                <p className="text-slate-500 text-sm">Realize um procedimento para gerar o relatório.</p>
                            </div>
                        ) : (
                            <div className="divide-y divide-slate-100">
                                {reports.map((rep) => {
                                    const d = new Date(rep.date);
                                    const dateStr = d.toLocaleDateString('pt-BR');
                                    const timeStr = d.toTimeString().slice(0,5);
                                    const duration = rep.totalTime ? formatTime(rep.totalTime) : '—';
                                    const rhythm = rep.diagnosis || '—';
                                    const scenarioLabel = SCENARIO_LABELS[rep.scenario] || '—';
                                    const outcomeLabel = rep.outcome === 'rce' ? 'RCE' : rep.outcome === 'obito' ? 'Óbito' : rep.outcome === 'resolucao' ? 'Resolução' : rep.outcome === 'evolucao_parada' ? '→ Parada' : '—';
                                    const outcomeColor = rep.outcome === 'rce' ? 'text-green-600' : rep.outcome === 'obito' ? 'text-red-600' : rep.outcome === 'resolucao' ? 'text-emerald-600' : rep.outcome === 'evolucao_parada' ? 'text-amber-600' : 'text-slate-400';
                                    return (
                                    <div key={rep.id} className="flex items-stretch">
                                        <button onClick={() => setViewingReport(rep)} className="flex-1 flex items-center p-4 bg-white hover:bg-slate-50 transition-colors text-left">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${rep.outcome === 'rce' ? 'bg-green-100 text-green-600' : rep.outcome === 'obito' ? 'bg-red-100 text-red-600' : rep.outcome === 'resolucao' ? 'bg-emerald-100 text-emerald-600' : rep.outcome === 'evolucao_parada' ? 'bg-amber-100 text-amber-600' : 'bg-blue-100 text-blue-600'}`}>
                                                <i className={`fas ${rep.outcome === 'rce' ? 'fa-heart-pulse' : rep.outcome === 'obito' ? 'fa-cross' : rep.outcome === 'resolucao' ? 'fa-check' : rep.outcome === 'evolucao_parada' ? 'fa-heart-circle-exclamation' : 'fa-file-medical-alt'} text-sm`}></i>
                                            </div>
                                            <div className="ml-3 flex-1 min-w-0">
                                                <h3 className="text-sm font-bold text-slate-800 truncate">{scenarioLabel} — {dateStr} às {timeStr}</h3>
                                                <p className="text-xs text-slate-500 mt-0.5 font-medium flex flex-wrap gap-x-2">
                                                    <span>{duration}</span>
                                                    <span className={`font-bold ${outcomeColor}`}>{outcomeLabel}</span>
                                                    <span>{rhythm}</span>
                                                </p>
                                            </div>
                                        </button>
                                        <button 
                                            onClick={() => {
                                                setModalConfig({
                                                    show: true,
                                                    title: 'Apagar Relatório',
                                                    message: `Deseja apagar o relatório de ${dateStr} às ${timeStr}?`,
                                                    confirmText: 'Apagar',
                                                    cancelText: 'Cancelar',
                                                    danger: true,
                                                    onConfirm: () => {
                                                        const updated = reports.filter(r => r.id !== rep.id);
                                                        setReports(updated);
                                                        localStorage.setItem(STORAGE_REPORTS, JSON.stringify(updated));
                                                        setModalConfig({ show: false });
                                                    },
                                                    onCancel: () => setModalConfig({ show: false })
                                                });
                                            }}
                                            className="px-4 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors"
                                        >
                                            <i className="fas fa-trash-alt text-sm"></i>
                                        </button>
                                    </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    )}

                    {homeTab === 'estatisticas' && (
                    <div className="flex-1 overflow-y-auto animate-fade-in hide-scrollbar p-4">
                        {reports.length === 0 ? (
                            <div className="flex flex-col items-center justify-center p-8 text-center min-h-full">
                                <div className="w-28 h-28 bg-slate-100 rounded-full flex items-center justify-center mb-6 text-slate-300 shadow-inner">
                                    <i className="fas fa-chart-bar text-5xl"></i>
                                </div>
                                <h2 className="text-xl font-bold text-slate-700 mb-2">Nenhuma Estatística</h2>
                                <p className="text-slate-500 text-sm">Complete e salve um relatório para ver estatísticas.</p>
                            </div>
                        ) : (() => {
                            const total = reports.length;
                            const rhythmCount = {};
                            const scenarioCount = {};
                            let rceCount = 0, obitoCount = 0, resolucaoCount = 0, evolucaoCount = 0;
                            let totalShocks = 0;
                            let totalAmio = 0;
                            let totalAdr = 0;
                            let totalDuration = 0;
                            reports.forEach(rep => {
                                totalDuration += rep.totalTime || 0;
                                if (rep.diagnosis) rhythmCount[rep.diagnosis] = (rhythmCount[rep.diagnosis] || 0) + 1;
                                if (rep.scenario) scenarioCount[rep.scenario] = (scenarioCount[rep.scenario] || 0) + 1;
                                if (rep.outcome === 'rce') rceCount++;
                                if (rep.outcome === 'obito') obitoCount++;
                                if (rep.outcome === 'resolucao') resolucaoCount++;
                                if (rep.outcome === 'evolucao_parada') evolucaoCount++;
                                totalShocks += rep.defibrillationCount || 0;
                                totalAmio += rep.amiodaroneDoseCount || 0;
                                (rep.events || []).forEach(ev => {
                                    if (ev.title === 'Executado Adrenalina') totalAdr++;
                                });
                            });
                            const avgDuration = total > 0 ? formatTime(Math.round(totalDuration / total)) : '—';
                            const mostCommonRhythm = Object.entries(rhythmCount).sort((a, b) => b[1] - a[1])[0];
                            return (
                            <div className="space-y-3">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
                                    <h3 className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-3">Resumo Geral</h3>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="bg-blue-50 rounded-xl p-3 text-center">
                                                    <span className="text-2xl font-black text-blue-600">{total}</span>
                                                    <p className="text-[10px] text-blue-500 font-semibold mt-0.5">Total</p>
                                                </div>
                                                <div className="bg-emerald-50 rounded-xl p-3 text-center">
                                                    <span className="text-2xl font-black text-emerald-600">{avgDuration}</span>
                                                    <p className="text-[10px] text-emerald-500 font-semibold mt-0.5">Duração Média</p>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-2">
                                                <div className="bg-green-50 rounded-xl p-2 text-center">
                                                    <span className="text-lg font-black text-green-600">{rceCount}</span>
                                                    <p className="text-[8px] text-green-500 font-semibold mt-0.5">RCE</p>
                                                </div>
                                                <div className="bg-red-50 rounded-xl p-2 text-center">
                                                    <span className="text-lg font-black text-red-600">{obitoCount}</span>
                                                    <p className="text-[8px] text-red-500 font-semibold mt-0.5">Óbito</p>
                                                </div>
                                                <div className="bg-emerald-50 rounded-xl p-2 text-center">
                                                    <span className="text-lg font-black text-emerald-600">{resolucaoCount}</span>
                                                    <p className="text-[8px] text-emerald-500 font-semibold mt-0.5">Resolução</p>
                                                </div>
                                                <div className="bg-amber-50 rounded-xl p-2 text-center">
                                                    <span className="text-lg font-black text-amber-600">{evolucaoCount}</span>
                                                    <p className="text-[8px] text-amber-500 font-semibold mt-0.5">→ Parada</p>
                                                </div>
                                            </div>
                                </div>

                                        <i className="fas fa-heart-pulse text-red-600"></i>

                                    </h3>
                                    
                                    {/* Door-to-Balloon Timer */}
                                    <div className="bg-white border-2 border-red-300 rounded-xl p-3 mb-2 shadow-sm">
                                        <div className="flex items-center justify-between mb-1">
                                            <span className="font-bold text-xs text-red-700"><i className="fas fa-clock mr-1"></i>Porta-Balão</span>
                                            <span className={`text-xs font-bold ${stemi.doorToBalloon ? (stemi.doorToBalloon < 90 ? 'text-green-600' : 'text-red-600') : 'text-slate-400'}`}>
                                                {stemi.doorToBalloon !== null ? `${stemi.doorToBalloon} min` : '—'} 
                                                {stemi.doorToBalloon !== null && (stemi.doorToBalloon < 90 ? '✓ Meta' : '⚠ Excedido')}
                                            </span>
                                        </div>
                                        {stemi.doorToBalloon === null && (
                                            <button onClick={() => { setPostCareState(prev => ({ ...prev, stemi: { ...prev.stemi, doorToBalloon: 0, startTime: Date.now() } })); const t = setInterval(() => { setPostCareState(p => { const elapsed = Math.floor((Date.now() - p.stemi.startTime) / 60000); return { ...p, stemi: { ...p.stemi, doorToBalloon: elapsed } }; }); }, 60000); window._stemiTimer = t; logEvent('system', 'STEMI: Iniciado cronômetro porta-balão'); }} className="w-full py-2 rounded-lg font-bold text-xs bg-red-600 text-white hover:bg-red-700 transition-all active:scale-95">
                                                Iniciar Cronômetro Porta-Balão (meta &lt; 90 min)
                                            </button>
                                        )}
                                    </div>

                                    {/* ECG Options */}

                                            {[{ label: 'IAM Anterior', ecg: 'anterior' }, { label: 'IAM Inferior', ecg: 'inferior' }, { label: 'IAM Lateral', ecg: 'lateral' }].map(opt => (
                                                <button key={opt.ecg} onClick={() => { setPostCareState(prev => ({ ...prev, stemi: { ...prev.stemi, ecg: opt.ecg } })); logEvent('system', `STEMI: ECG ${opt.label}`); }} className={`flex-1 py-2 rounded-lg font-bold text-xs border-2 transition-all active:scale-95 ${stemi.ecg === opt.ecg ? 'bg-red-500 border-red-400 text-white' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}>
                                                    {opt.label}
                                                </button>

                                        </div>

                                            {[
                                                { label: 'AAS 162-325 mg mastigável', id: 'aas' },
                                                { label: 'Nitrato sublingual (se dor torácica)', id: 'nitrato' },
                                                { label: 'Morfina 2-4 mg IV (se dor refratária)', id: 'morfina' },
                                                { label: 'Heparina não fracionada 60 UI/kg (máx 4000)', id: 'heparina' },
                                                { label: 'Ticagrelor 180 mg ou Prasugrel 60 mg', id: 'antiagregante' },

                                                    <label htmlFor={`stemi-${med.id}`} className="text-[10px] text-slate-600 cursor-pointer">{med.label}</label>
                                                </div>

                                        </div>

                            {/* Generic care checklist */}

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 divide-y divide-slate-100">
                                {[
                                    'Monitorize adequadamente os parâmetros vitais (monitorização cardíaca, PA, oximetria, temperatura e glicemia)',
                                    'Obter ECG de 12 derivações',
                                    'Manejo da via aérea (capnografia, SpO2 92-98%, PaCO2 35-45mmHg)',
                                    'Controle hemodinâmico (PAS >90 mmHg ou PAM >65 mmHg)',
                                    'Se comatoso: iniciar Controle Direcionado de Temperatura (32° a 36°C)',
                                    'Avaliar transferência imediata para UTI ou Hemodinâmica'
                                ].map((item, idx) => (

                                        <div className="mt-0.5 relative shrink-0">

                                                <i className="fas fa-check text-white text-xs opacity-0 peer-checked:opacity-100"></i>

                                        <label htmlFor={`check-${idx}`} className="ml-3 text-slate-700 text-sm font-medium leading-relaxed cursor-pointer select-none">{item}</label>
                                    </div>

                        <div className="p-6 bg-white border-t border-slate-100 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                            <button 
                                onClick={handleSaveComplete} 
                                className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg flex items-center justify-center gap-2"
                            >
                                <i className="fas fa-save"></i> Salvar Relatório
                            </button>
                        </div>
                    </div>
                );
            };

            // ── NOTIFICATION BANNER ──
            const renderNotificationBanner = () => {
                if (notifications.length === 0) return null;
                const n = notifications[notifications.length - 1];
                const bgColor = n.type === 'shock' ? 'bg-red-600' : n.type === 'adrenaline' ? 'bg-blue-600' : n.type === 'rhythm' ? 'bg-amber-500' : 'bg-slate-600';
                const icon = n.type === 'shock' ? 'fa-bolt' : n.type === 'adrenaline' ? 'fa-syringe' : n.type === 'rhythm' ? 'fa-heart-pulse' : 'fa-info-circle';
                return (
                    <div className={`${bgColor} text-white px-4 py-2 flex items-center gap-3 animate-fade-in shadow-lg`}>
                        <div className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center shrink-0">
                            <i className={`fas ${icon} text-sm`}></i>

                        <p className="text-xs font-bold flex-1">{n.message}</p>
                        <button onClick={() => dismissNotification(n.id)} className="w-7 h-7 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30 transition-colors shrink-0">
                            <i className="fas fa-times text-xs"></i>
                        </button>
                    </div>
                );
            };

            // ── REPORT VIEW ──
            const renderReportView = () => {
                if (!viewingReport) return null;
                const rep = viewingReport;
                const d = new Date(rep.date);
                const scenarioLabel = SCENARIO_LABELS[rep.scenario] || '—';
                const outcomeLabel = rep.outcome === 'rce' ? 'RCE (Retorno da Circulação Espontânea)' : rep.outcome === 'obito' ? 'Óbito' : rep.outcome === 'resolucao' ? 'Resolução (ritmo normalizado)' : rep.outcome === 'evolucao_parada' ? 'Evoluiu para Parada Cardíaca' : '—';
                const outcomeColor = rep.outcome === 'rce' ? 'text-green-600' : rep.outcome === 'obito' ? 'text-red-600' : rep.outcome === 'resolucao' ? 'text-emerald-600' : rep.outcome === 'evolucao_parada' ? 'text-amber-600' : 'text-slate-400';
                return (
                    <div className="flex flex-col h-dynamic bg-slate-50 w-full max-w-md mx-auto shadow-2xl relative">
                        <header className="bg-slate-800 text-white p-4 flex items-center shadow-md z-10">

                                <i className="fas fa-arrow-left text-lg"></i>
                            </button>
                            <div className="flex-1 text-center">
                                <h1 className="text-sm font-bold tracking-wide">Relatório {d.toLocaleDateString('pt-BR')}</h1>
                                <p className="text-[10px] text-slate-400 font-medium">{scenarioLabel} &middot; {rep.diagnosis || '—'} &middot; {rep.totalTime ? formatTime(rep.totalTime) : '—'}</p>
                            </div>
                            <div className="w-8"></div>
                        </header>
                        <div className="px-4 py-2 bg-white border-b border-slate-100 flex items-center gap-2">
                            <span className={`text-xs font-bold ${outcomeColor}`}>
                                <i className={`fas ${rep.outcome === 'rce' ? 'fa-heart-pulse' : rep.outcome === 'obito' ? 'fa-cross' : rep.outcome === 'resolucao' ? 'fa-check' : rep.outcome === 'evolucao_parada' ? 'fa-heart-circle-exclamation' : 'fa-minus'} mr-1`}></i>
                                {outcomeLabel}
                            </span>
                            {rep.causaSuspeita && (
                                <span className="text-xs text-blue-600 font-medium ml-auto">
                                    <i className="fas fa-search mr-1"></i>{rep.causaSuspeita}
                                </span>
                            )}
                        </div>
                        <div className="flex-1 overflow-y-auto hide-scrollbar">
                            <div className="flex gap-1.5 p-2 bg-slate-100 border-b border-slate-200">
                                <button onClick={() => { const t = generateReportText(rep.events, rep.date, rep.scenario); navigator.clipboard.writeText(t).catch(() => {}); }} className="flex-1 py-2 rounded-lg font-bold text-xs bg-white border border-slate-300 text-slate-700 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 transition-colors flex items-center justify-center gap-1.5 shadow-sm">
                                    <i className="fas fa-copy"></i> Copiar
                                </button>
                                <button onClick={() => { const t = generateReportText(rep.events, rep.date, rep.scenario); const b = new Blob([t], {type:'text/plain;charset=utf-8'}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = `relatorio_acls_${rep.date.slice(0,10)}.txt`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); }} className="flex-1 py-2 rounded-lg font-bold text-xs bg-white border border-slate-300 text-slate-700 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 transition-colors flex items-center justify-center gap-1.5 shadow-sm">
                                    <i className="fas fa-download"></i> Baixar .txt
                                </button>
                            </div>
                            {rep.scenario === 'cardiacArrest' ? (() => {
                                const drugsList = ['Adrenalina', 'Amiodarona', 'Bic. Sódio', 'Cálcio', 'Magnésio', 'Lidocaína', 'Potássio', 'Volume'];
                                const cycleMap = {};
                                rep.events.forEach(ev => {
                                    if (ev.type === 'system') return;
                                    const c = ev.cycle || 1;
                                    if (!cycleMap[c]) cycleMap[c] = { cycle: c, rhythm: '', shock: false, drugs: [], interventions: [] };
                                    const row = cycleMap[c];
                                    if (ev.title.startsWith('Diagnosticado ')) row.rhythm = ev.title.slice('Diagnosticado '.length);
                                    else if (ev.title.startsWith('Executado Desfibrilação')) row.shock = true;
                                    else if (ev.title.startsWith('Executado ')) {
                                        const action = ev.title.slice('Executado '.length);
                                        if (drugsList.includes(action)) { if (!row.drugs.includes(action)) row.drugs.push(action); }
                                        else { if (!row.interventions.includes(action)) row.interventions.push(action); }
                                    }
                                });
                                const cycles = Object.values(cycleMap).sort((a, b) => a.cycle - b.cycle);
                                return (
                            <table className="w-full text-xs">
                                <thead className="bg-slate-100 sticky top-0 z-10">
                                    <tr className="border-b border-slate-200">
                                        <th className="p-2 text-left font-bold text-slate-500 w-10">#</th>
                                        <th className="p-2 text-left font-bold text-slate-500">Ritmo</th>
                                        <th className="p-2 text-center font-bold text-slate-500 w-12">Choque</th>
                                        <th className="p-2 text-left font-bold text-slate-500">Drogas</th>
                                        <th className="p-2 text-left font-bold text-slate-500">Interv.</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {cycles.map(row => (
                                        <tr key={row.cycle} className="bg-white">
                                            <td className="p-2 font-bold text-slate-700 align-top">{row.cycle}</td>
                                            <td className={`p-2 font-semibold align-top ${row.rhythm === 'FV / TVSP' ? 'text-red-600' : row.rhythm ? 'text-blue-600' : 'text-slate-300'}`}>{row.rhythm || '—'}</td>
                                            <td className="p-2 text-center align-top">{row.shock ? <span className="text-amber-500"><i className="fas fa-bolt"></i></span> : <span className="text-slate-200">—</span>}</td>
                                            <td className="p-2 text-slate-600 align-top">{row.drugs.length ? row.drugs.join(', ') : <span className="text-slate-300">—</span>}</td>
                                            <td className="p-2 text-slate-600 align-top">{row.interventions.length ? row.interventions.join(', ') : <span className="text-slate-300">—</span>}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                                );
                            })() : (
                            <div className="p-3 space-y-2">
                                {[...rep.events].filter(e => e.type !== 'system').reverse().map((ev, i) => (
                                    <div key={ev.id} className="flex items-start gap-3 bg-white rounded-xl p-3 shadow-sm border border-slate-100">
                                        <div className="w-14 shrink-0 text-center">
                                            <span className="text-[10px] font-mono font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">{ev.elapsedTime}</span>
                                        </div>
                                        <div className="min-w-0 flex-1">
                                            <div className="text-xs font-bold text-slate-700">{ev.title}</div>
                                            {ev.description && <div className="text-[10px] text-slate-400 mt-0.5">{ev.description}</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            )}
                            <div className="px-3 py-2 border-t border-slate-100">
                                <div className="text-[10px] text-slate-400 font-medium leading-relaxed">
                                    <p><span className="font-bold text-slate-500">Eventos:</span> {rep.events.length} registros</p>
                                    <p><span className="font-bold text-slate-500">Duração total:</span> {rep.totalTime ? formatTime(rep.totalTime) : '—'}</p>
                                    <p className="mt-2 text-amber-600"><i className="fas fa-info-circle mr-1"></i>Dados salvos no cache do navegador.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <>
                    {viewingReport && renderReportView()}
                    {!viewingReport && currentView === 'home' && renderHome()}
                    {!viewingReport && currentView === 'procedure' && renderProcedure()}
                    {!viewingReport && currentView === 'postCare' && renderPostCare()}
                    
                    <Modal {...modalConfig} />
                    <OutcomeModal 
                        show={outcomeModal}
                        scenario={selectedScenario}
                        onRCE={handleOutcomeRCE}
                        onObito={handleOutcomeObito}
                        onResolucao={handleOutcomeResolucao}
                        onEvolucaoParada={handleOutcomeEvolucaoParada}
                        onCancel={() => setOutcomeModal(false)}
                    />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
