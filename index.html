<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guia ACLS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.8; }
        }
        .animate-pulse-soft {
            animation: pulseSoft 0.545s infinite;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .timer-text {
            font-variant-numeric: tabular-nums;
        }

        @keyframes blink-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.96); }
        }
        .animate-blink {
            animation: blink-pulse 0.8s ease-in-out infinite;
        }

        .h-dynamic {
            height: 100vh;
            height: 100dvh;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
    </style>
</head>
<body class="text-slate-800">
    <div id="root" class="h-dynamic w-screen flex justify-center bg-black"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const CYCLE_DURATION = 120;
        const ADRENALINE_DURATION = 240;
        const BPM_MIN = 60;
        const BPM_MAX = 160;
        const BPM_DEFAULT = 110;

        const formatTime = (totalSeconds) => {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const getCurrentTimeStr = () => {
            return new Date().toTimeString().split(' ')[0];
        };

        const STORAGE_CURRENT = 'acls_current';
        const STORAGE_REPORTS = 'acls_reports';

        const CircularTimer = ({ label, subLabel, progress, max, colorClass, trailColorClass = "text-slate-700" }) => {
            const radius = 32;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (progress / max) * circumference;

            return (
                <div className="grid place-items-center w-20 h-20">
                    <svg className="w-full h-full col-start-1 row-start-1" viewBox="0 0 80 80">
                        <circle
                            className={`${trailColorClass} stroke-current`}
                            strokeWidth="4"
                            fill="none"
                            r={radius}
                            cx="40"
                            cy="40"
                            transform="rotate(-90, 40, 40)"
                        />
                        <circle
                            className={`${colorClass} stroke-current transition-all duration-1000 ease-linear`}
                            strokeWidth="4"
                            strokeLinecap="round"
                            fill="none"
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            r={radius}
                            cx="40"
                            cy="40"
                            transform="rotate(-90, 40, 40)"
                        />
                    </svg>
                    <div className="col-start-1 row-start-1 flex flex-col items-center justify-center -mt-0.5">
                        <span className="text-base font-bold text-white tracking-wider leading-tight drop-shadow-md">{label}</span>
                        <span className="text-[8px] text-slate-400 font-medium -mt-0.5">{subLabel}</span>
                    </div>
                </div>
            );
        };

        const Modal = ({ show, title, message, onConfirm, onCancel, confirmText = "Confirmar", cancelText = "Cancelar", danger = false }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-2xl">
                        <h3 className="text-lg font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-sm mb-5">{message}</p>
                        <div className="flex justify-end space-x-3">
                            <button onClick={onCancel} className="px-4 py-2 rounded-xl font-semibold text-sm text-slate-600 hover:bg-slate-100 transition-colors">
                                {cancelText}
                            </button>
                            <button onClick={onConfirm} className={`px-4 py-2 rounded-xl font-semibold text-sm text-white transition-colors shadow-md ${danger ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                {confirmText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('home');
            const [activeTab, setActiveTab] = useState('procedimento');
            
            const [isRunning, setIsRunning] = useState(false);
            const [startTime, setStartTime] = useState(null);
            const [elapsedSecs, setElapsedSecs] = useState(0);
            
            const [cycleCount, setCycleCount] = useState(0);
            const [lastAdrenalineTime, setLastAdrenalineTime] = useState(null);
            
            const [diagnosis, setDiagnosis] = useState(null);
            const [causaSuspeita, setCausaSuspeita] = useState(null);
            const [events, setEvents] = useState([]);
            
            const [isMuted, setIsMuted] = useState(true);
            const [bpm, setBpm] = useState(BPM_DEFAULT);
            const [modalConfig, setModalConfig] = useState({ show: false });
            const [tickVisual, setTickVisual] = useState(false);
            const [defibrillationCount, setDefibrillationCount] = useState(0);
            const [amiodaroneDoseCount, setAmiodaroneDoseCount] = useState(0);
            const [suggestedAction, setSuggestedAction] = useState(null);
            const [reports, setReports] = useState([]);
            const [viewingReport, setViewingReport] = useState(null);
            const [homeTab, setHomeTab] = useState('rcps');

            const audioCtxRef = useRef(null);
            const metronomeIntervalRef = useRef(null);
            const timerRef = useRef(null);
            const prevCycleRef = useRef(0);
            const wakeLockRef = useRef(null);

            useEffect(() => {
                if (isRunning) {
                    timerRef.current = setInterval(() => {
                        const totalSecs = Math.floor((Date.now() - startTime) / 1000);
                        setElapsedSecs(totalSecs);
                        setCycleCount(Math.floor(totalSecs / CYCLE_DURATION) + 1);
                    }, 1000);

                    if (!audioCtxRef.current) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        audioCtxRef.current = new AudioContext();
                    }

                    const ms = 60000 / bpm;
                    metronomeIntervalRef.current = setInterval(() => {
                        setTickVisual(prev => !prev);
                        
                        if (!isMuted && audioCtxRef.current && audioCtxRef.current.state === 'running') {
                            try {
                                const osc = audioCtxRef.current.createOscillator();
                                const gain = audioCtxRef.current.createGain();
                                osc.connect(gain);
                                gain.connect(audioCtxRef.current.destination);
                                
                                osc.type = 'sine';
                                osc.frequency.setValueAtTime(800, audioCtxRef.current.currentTime);
                                
                                gain.gain.setValueAtTime(0, audioCtxRef.current.currentTime);
                                gain.gain.linearRampToValueAtTime(0.05, audioCtxRef.current.currentTime + 0.01);
                                gain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.1);
                                
                                osc.start(audioCtxRef.current.currentTime);
                                osc.stop(audioCtxRef.current.currentTime + 0.1);
                            } catch (e) { console.error("Audio error", e); }
                        }
                    }, ms);

                } else {
                    clearInterval(timerRef.current);
                    clearInterval(metronomeIntervalRef.current);
                }

                return () => {
                    clearInterval(timerRef.current);
                    clearInterval(metronomeIntervalRef.current);
                };
            }, [isRunning, startTime, isMuted, bpm]);

            useEffect(() => {
                if (isRunning && cycleCount > 1 && cycleCount !== prevCycleRef.current) {
                    prevCycleRef.current = cycleCount;
                    if (!suggestedAction || suggestedAction === 'reavaliar_ritmo') {
                        setSuggestedAction('reavaliar_ritmo');
                    }
                }
            }, [cycleCount, isRunning, suggestedAction]);

            useEffect(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_CURRENT);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.events) setEvents(data.events);
                        if (data.diagnosis) setDiagnosis(data.diagnosis);
                        if (data.defibrillationCount) setDefibrillationCount(data.defibrillationCount);
                        if (data.amiodaroneDoseCount) setAmiodaroneDoseCount(data.amiodaroneDoseCount);
                        if (data.lastAdrenalineTime) setLastAdrenalineTime(data.lastAdrenalineTime);
                        if (data.startTime) setStartTime(data.startTime);
                        if (data.isRunning && data.startTime) {
                            setIsRunning(true);
                            setElapsedSecs(Math.floor((Date.now() - data.startTime) / 1000));
                        }
                        if (data.currentView === 'postCare') setCurrentView('postCare');
                        else if (data.isRunning && data.startTime) setCurrentView('procedure');
                    }
                    try {
                        const rep = JSON.parse(localStorage.getItem(STORAGE_REPORTS) || '[]');
                        if (Array.isArray(rep)) setReports(rep);
                    } catch (e) { /* ignore */ }
                } catch (e) {
                    console.error('Falha ao restaurar dados salvos', e);
                }
            }, []);

            useEffect(() => {
                try {
                    const data = {
                        events,
                        diagnosis,
                        defibrillationCount,
                        amiodaroneDoseCount,
                        lastAdrenalineTime,
                        startTime,
                        isRunning,
                        currentView
                    };
                    localStorage.setItem(STORAGE_CURRENT, JSON.stringify(data));
                } catch (e) {
                    console.error('Falha ao salvar dados', e);
                }
            }, [events, diagnosis, defibrillationCount, amiodaroneDoseCount, lastAdrenalineTime, startTime, isRunning, currentView]);

            const cycleSeconds = elapsedSecs % CYCLE_DURATION;
            const adrenalineSeconds = lastAdrenalineTime 
                ? Math.floor((Date.now() - lastAdrenalineTime) / 1000) 
                : 0;

            const logEvent = (type, title, description = '', forcedElapsed) => {
                const nowStr = getCurrentTimeStr();
                const elapsed = forcedElapsed !== undefined ? forcedElapsed : elapsedSecs;
                const elapsedStr = formatTime(elapsed);
                const cycle = Math.floor(elapsed / CYCLE_DURATION) + 1;
                setEvents(prev => [{
                    id: Date.now(),
                    type,
                    title,
                    description,
                    absoluteTime: nowStr,
                    elapsedTime: elapsedStr,
                    cycle
                }, ...prev]);
            };

            const handleStartProcedure = () => {
                const now = Date.now();
                setStartTime(now);
                setIsRunning(true);
                setCurrentView('procedure');
                setEvents([]);
                setDiagnosis(null);
                setCausaSuspeita(null);
                setElapsedSecs(0);
                setCycleCount(1);
                setDefibrillationCount(0);
                setAmiodaroneDoseCount(0);
                setSuggestedAction(null);
                
                localStorage.removeItem(STORAGE_CURRENT);
                
                logEvent('system', 'Procedimento iniciado', `Em ${new Date().toLocaleDateString('pt-BR')} ${getCurrentTimeStr()}`, 0);
                
                requestWakeLock();
                
                if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
            };

            const handleAction = (category, item) => {
                const actionVerb = category === 'diagnosis' ? 'Diagnosticado' : 'Executado';
                logEvent('action', `${actionVerb} ${item}`, `${formatTime(elapsedSecs)} de procedimento`);
                
                if (category === 'diagnosis') {
                    setDiagnosis(item);
                    if (item === 'FV / TVSP') {
                        setSuggestedAction('desfribilacao');
                    } else {
                        const now = Date.now();
                        if (!lastAdrenalineTime || now - lastAdrenalineTime > 240000) {
                            setSuggestedAction('adrenalina');
                        } else {
                            setSuggestedAction(null);
                        }
                    }
                } else if (item === 'Desfibrilação') {
                    const newCount = defibrillationCount + 1;
                    setDefibrillationCount(newCount);
                    const now = Date.now();
                    if (newCount === 3 && amiodaroneDoseCount < 1) {
                        setSuggestedAction('amiodarona');
                    } else if (newCount === 5 && amiodaroneDoseCount < 2) {
                        setSuggestedAction('amiodarona');
                    } else if (newCount >= 2 && (!lastAdrenalineTime || now - lastAdrenalineTime > 240000)) {
                        setSuggestedAction('adrenalina');
                    } else {
                        setSuggestedAction(null);
                    }
                } else if (item === 'Adrenalina') {
                    setLastAdrenalineTime(Date.now());
                    setSuggestedAction(null);
                } else if (item === 'Amiodarona') {
                    setAmiodaroneDoseCount(prev => Math.min(prev + 1, 2));
                    setSuggestedAction(null);
                }
            };

            const confirmDeleteEvent = (id) => {
                setModalConfig({
                    show: true,
                    title: 'Remover Evento',
                    message: 'Deseja realmente remover este registro do relatório?',
                    confirmText: 'Remover',
                    danger: true,
                    onConfirm: () => {
                        setEvents(prev => prev.filter(e => e.id !== id));
                        setModalConfig({ show: false });
                    },
                    onCancel: () => setModalConfig({ show: false })
                });
            };

            const requestFinish = () => {
                setModalConfig({
                    show: true,
                    title: 'Finalizar RCP',
                    message: 'Deseja realmente finalizar as compressões e seguir para os cuidados pós-RCP?',
                    confirmText: 'Finalizar',
                    danger: true,
                    onConfirm: () => {
                        setIsRunning(false);
                        releaseWakeLock();
                        logEvent('system', 'Procedimento finalizado', `Duração total: ${formatTime(elapsedSecs)}`);
                        setCurrentView('postCare');
                        setModalConfig({ show: false });
                    },
                    onCancel: () => setModalConfig({ show: false })
                });
            };

            const generateReportText = () => {
                const dateStr = new Date().toLocaleDateString('pt-BR') + ' ' + getCurrentTimeStr().slice(0,5);
                const drugsList = ['Adrenalina', 'Amiodarona', 'Bic. Sódio', 'Cálcio', 'Magnésio', 'Lidocaína', 'Potássio', 'Volume'];
                const cycleMap = {};
                events.forEach(ev => {
                    if (ev.type === 'system') return;
                    const c = ev.cycle || 1;
                    if (!cycleMap[c]) cycleMap[c] = { cycle: c, rhythm: '', shock: false, drugs: [], interventions: [] };
                    const row = cycleMap[c];
                    if (ev.title.startsWith('Diagnosticado ')) {
                        row.rhythm = ev.title.slice('Diagnosticado '.length);
                    } else if (ev.title === 'Executado Desfibrilação') {
                        row.shock = true;
                    } else if (ev.title.startsWith('Executado ')) {
                        const action = ev.title.slice('Executado '.length);
                        if (drugsList.includes(action)) {
                            if (!row.drugs.includes(action)) row.drugs.push(action);
                        } else {
                            if (!row.interventions.includes(action)) row.interventions.push(action);
                        }
                    }
                });
                const cycles = Object.values(cycleMap).sort((a, b) => a.cycle - b.cycle);
                let text = `=== RELATÓRIO ACLS ===\n`;
                text += `Data: ${dateStr}\n`;
                const startEv = events.filter(e => e.type === 'system');
                if (startEv.length) text += `Início: ${startEv[startEv.length-1].description}\n`;
                text += `\n`;
                cycles.forEach(row => {
                    text += `Ciclo ${row.cycle}\n`;
                    text += `  Ritmo: ${row.rhythm || '—'}\n`;
                    text += `  Choque: ${row.shock ? 'SIM' : 'NÃO'}\n`;
                    text += `  Drogas: ${row.drugs.length ? row.drugs.join(', ') : '—'}\n`;
                    text += `  Intervenções: ${row.interventions.length ? row.interventions.join(', ') : '—'}\n`;
                    text += `\n`;
                });
                return text;
            };

            const handleCopyReport = () => {
                const text = generateReportText();
                navigator.clipboard.writeText(text).then(() => {
                    setModalConfig({
                        show: true,
                        title: 'Relatório Copiado',
                        message: 'O relatório foi copiado para a área de transferência.',
                        confirmText: 'OK',
                        onConfirm: () => setModalConfig({ show: false }),
                        onCancel: () => setModalConfig({ show: false })
                    });
                }).catch(() => {
                    setModalConfig({
                        show: true,
                        title: 'Erro ao Copiar',
                        message: 'Não foi possível copiar o relatório automaticamente.',
                        confirmText: 'OK',
                        onConfirm: () => setModalConfig({ show: false }),
                        onCancel: () => setModalConfig({ show: false })
                    });
                });
            };

            const handleDownloadReport = () => {
                const text = generateReportText();
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `relatorio_acls_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleToggleMute = () => {
                if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
                setIsMuted(!isMuted);
            };

            const requestWakeLock = async () => {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    }
                } catch (e) {
                    console.log('Wake Lock não disponível', e);
                }
            };

            const releaseWakeLock = () => {
                if (wakeLockRef.current) {
                    wakeLockRef.current.release();
                    wakeLockRef.current = null;
                }
            };

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && isRunning) {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [isRunning]);

            const handleSaveComplete = () => {
                const report = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    events,
                    diagnosis,
                    totalTime: elapsedSecs,
                    cycleCount,
                    defibrillationCount,
                    amiodaroneDoseCount
                };
                const updated = [report, ...reports];
                setReports(updated);
                try {
                    localStorage.setItem(STORAGE_REPORTS, JSON.stringify(updated));
                } catch (e) { /* ignore */ }
                localStorage.removeItem(STORAGE_CURRENT);
                releaseWakeLock();
                setCurrentView('home');
                setEvents([]);
                setDiagnosis(null);
                setDefibrillationCount(0);
                setAmiodaroneDoseCount(0);
                setLastAdrenalineTime(null);
                setCausaSuspeita(null);
            };

            const renderHome = () => (
                <div className="flex flex-col h-dynamic bg-slate-50 w-full max-w-md mx-auto shadow-2xl relative">
                    <header className="bg-slate-800 text-white p-5 flex items-center justify-center shadow-lg z-10">
                        <h1 className="text-xl font-bold tracking-wide"><span className="text-blue-400">Guia</span> <span className="text-white">ACLS</span></h1>
                    </header>
                    
                    <div className="flex bg-white shadow-sm z-0">
                        <button onClick={() => setHomeTab('rcps')} className={`flex-1 py-4 font-bold transition-colors ${homeTab === 'rcps' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-slate-400 hover:text-slate-600'}`}>RCPs</button>
                        <button onClick={() => setHomeTab('estatisticas')} className={`flex-1 py-4 font-bold transition-colors ${homeTab === 'estatisticas' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/30' : 'text-slate-400 hover:text-slate-600'}`}>Estatísticas</button>
                    </div>
                    
                    {homeTab === 'rcps' && (
                    <div className="flex-1 overflow-y-auto animate-fade-in hide-scrollbar">
                        {reports.length === 0 ? (
                            <div className="flex flex-col items-center justify-center p-8 text-center min-h-full">
                                <div className="w-28 h-28 bg-slate-100 rounded-full flex items-center justify-center mb-6 text-slate-300 shadow-inner">
                                    <i className="fas fa-file-medical-alt text-5xl"></i>
                                </div>
                                <h2 className="text-xl font-bold text-slate-700 mb-2">Nenhum Registro</h2>
                                <p className="text-slate-500 text-sm">Não existem procedimentos de RCP realizados recentemente.</p>
                            </div>
                        ) : (
                            <div className="divide-y divide-slate-100">
                                {reports.map((rep) => {
                                    const d = new Date(rep.date);
                                    const dateStr = d.toLocaleDateString('pt-BR');
                                    const timeStr = d.toTimeString().slice(0,5);
                                    const duration = rep.totalTime ? formatTime(rep.totalTime) : '—';
                                    const rhythm = rep.diagnosis || 'Não diagnosticado';
                                    return (
                                    <div key={rep.id} className="flex items-stretch">
                                        <button onClick={() => setViewingReport(rep)} className="flex-1 flex items-center p-4 bg-white hover:bg-slate-50 transition-colors text-left">
                                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center shrink-0">
                                                <i className="fas fa-file-medical-alt text-sm"></i>
                                            </div>
                                            <div className="ml-3 flex-1">
                                                <h3 className="text-sm font-bold text-slate-800">RCP {dateStr} às {timeStr}</h3>
                                                <p className="text-xs text-slate-500 mt-0.5 font-medium">
                                                    {duration} &middot; {rhythm}
                                                </p>
                                            </div>
                                        </button>
                                        <button 
                                            onClick={() => {
                                                setModalConfig({
                                                    show: true,
                                                    title: 'Apagar Relatório',
                                                    message: `Deseja apagar o relatório de RCP de ${dateStr} às ${timeStr}?`,
                                                    confirmText: 'Apagar',
                                                    cancelText: 'Cancelar',
                                                    danger: true,
                                                    onConfirm: () => {
                                                        const updated = reports.filter(r => r.id !== rep.id);
                                                        setReports(updated);
                                                        localStorage.setItem(STORAGE_REPORTS, JSON.stringify(updated));
                                                        setModalConfig({ show: false });
                                                    },
                                                    onCancel: () => setModalConfig({ show: false })
                                                });
                                            }}
                                            className="px-4 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 transition-colors"
                                        >
                                            <i className="fas fa-trash-alt text-sm"></i>
                                        </button>
                                    </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    )}

                    {homeTab === 'estatisticas' && (
                    <div className="flex-1 overflow-y-auto animate-fade-in hide-scrollbar p-4">
                        {reports.length === 0 ? (
                            <div className="flex flex-col items-center justify-center p-8 text-center min-h-full">
                                <div className="w-28 h-28 bg-slate-100 rounded-full flex items-center justify-center mb-6 text-slate-300 shadow-inner">
                                    <i className="fas fa-chart-bar text-5xl"></i>
                                </div>
                                <h2 className="text-xl font-bold text-slate-700 mb-2">Nenhuma Estatística</h2>
                                <p className="text-slate-500 text-sm">Complete e salve um relatório de RCP para ver estatísticas.</p>
                            </div>
                        ) : (() => {
                            const total = reports.length;
                            const rhythmCount = {};
                            let totalShocks = 0;
                            let totalAmio = 0;
                            let totalAdr = 0;
                            let totalDuration = 0;

                                        <input type="checkbox" className="peer sr-only" id={`check-${idx}`} />
                                        <label htmlFor={`check-${idx}`} className="block w-6 h-6 border-2 border-slate-300 rounded-full cursor-pointer peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all flex items-center justify-center">
                                            <i className="fas fa-check text-white text-xs opacity-0 peer-checked:opacity-100"></i>
                                        </label>
                                    </div>
                                    <label htmlFor={`check-${idx}`} className="ml-3 text-slate-700 text-sm font-medium leading-relaxed cursor-pointer select-none">{item}</label>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="p-6 bg-white border-t border-slate-100 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                        <button 
                            onClick={handleSaveComplete} 
                            className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg flex items-center justify-center gap-2"
                        >
                            <i className="fas fa-save"></i> Salvar Relatório
                        </button>
                    </div>
                </div>
            );

            const renderReportView = () => {
                if (!viewingReport) return null;
                const rep = viewingReport;
                const d = new Date(rep.date);
                const drugsList = ['Adrenalina', 'Amiodarona', 'Bic. Sódio', 'Cálcio', 'Magnésio', 'Lidocaína', 'Potássio', 'Volume'];
                const cycleMap = {};
                rep.events.forEach(ev => {
                    if (ev.type === 'system') return;
                    const c = ev.cycle || 1;
                    if (!cycleMap[c]) cycleMap[c] = { cycle: c, rhythm: '', shock: false, drugs: [], interventions: [] };
                    const row = cycleMap[c];
                    if (ev.title.startsWith('Diagnosticado ')) row.rhythm = ev.title.slice('Diagnosticado '.length);
                    else if (ev.title === 'Executado Desfibrilação') row.shock = true;
                    else if (ev.title.startsWith('Executado ')) {
                        const action = ev.title.slice('Executado '.length);
                        if (drugsList.includes(action)) { if (!row.drugs.includes(action)) row.drugs.push(action); }
                        else { if (!row.interventions.includes(action)) row.interventions.push(action); }
                    }
                });
                const cycles = Object.values(cycleMap).sort((a, b) => a.cycle - b.cycle);
                return (
                    <div className="flex flex-col h-dynamic bg-slate-50 w-full max-w-md mx-auto shadow-2xl relative">
                        <header className="bg-slate-800 text-white p-4 flex items-center shadow-md z-10">
                            <button onClick={() => setViewingReport(null)} className="p-2 -ml-2 text-slate-400 hover:text-white transition-colors">
                                <i className="fas fa-arrow-left text-lg"></i>
                            </button>
                            <div className="flex-1 text-center">
                                <h1 className="text-sm font-bold tracking-wide">Relatório {d.toLocaleDateString('pt-BR')}</h1>
                                <p className="text-[10px] text-slate-400 font-medium">{rep.diagnosis || '—'} &middot; {rep.totalTime ? formatTime(rep.totalTime) : '—'}</p>
                            </div>
                            <div className="w-8"></div>
                        </header>
                        <div className="flex-1 overflow-y-auto hide-scrollbar">
                            <table className="w-full text-xs">
                                <thead className="bg-slate-100 sticky top-0 z-10">
                                    <tr className="border-b border-slate-200">
                                        <th className="p-2 text-left font-bold text-slate-500 w-10">#</th>
                                        <th className="p-2 text-left font-bold text-slate-500">Ritmo</th>
                                        <th className="p-2 text-center font-bold text-slate-500 w-12">Choque</th>
                                        <th className="p-2 text-left font-bold text-slate-500">Drogas</th>
                                        <th className="p-2 text-left font-bold text-slate-500">Interv.</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {cycles.map(row => (
                                        <tr key={row.cycle} className="bg-white">
                                            <td className="p-2 font-bold text-slate-700 align-top">{row.cycle}</td>
                                            <td className={`p-2 font-semibold align-top ${row.rhythm === 'FV / TVSP' ? 'text-red-600' : row.rhythm ? 'text-blue-600' : 'text-slate-300'}`}>{row.rhythm || '—'}</td>
                                            <td className="p-2 text-center align-top">{row.shock ? <span className="text-amber-500"><i className="fas fa-bolt"></i></span> : <span className="text-slate-200">—</span>}</td>
                                            <td className="p-2 text-slate-600 align-top">{row.drugs.length ? row.drugs.join(', ') : <span className="text-slate-300">—</span>}</td>
                                            <td className="p-2 text-slate-600 align-top">{row.interventions.length ? row.interventions.join(', ') : <span className="text-slate-300">—</span>}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <div className="px-3 py-2 border-t border-slate-100">
                                <div className="text-[10px] text-slate-400 font-medium leading-relaxed">
                                    <p><span className="font-bold text-slate-500">Eventos:</span> {rep.events.length} registros</p>
                                    <p><span className="font-bold text-slate-500">Duração total:</span> {rep.totalTime ? formatTime(rep.totalTime) : '—'}</p>
                                    <p className="mt-2 text-amber-600"><i className="fas fa-info-circle mr-1"></i>Dados salvos no cache do navegador. O cache é um armazenamento temporário — os dados podem ser perdidos se você limpar o cache ou usar outro dispositivo.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <>
                    {viewingReport && renderReportView()}
                    {!viewingReport && currentView === 'home' && renderHome()}
                    {!viewingReport && currentView === 'procedure' && renderProcedure()}
                    {!viewingReport && currentView === 'postCare' && renderPostCare()}
                    
                    <Modal {...modalConfig} />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
